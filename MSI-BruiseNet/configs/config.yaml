# =============================================================================
# MSI-BruiseNet Configuration
# 9-Band Multispectral Apple Bruise Semantic Segmentation
# =============================================================================

# ========== 📂 DATA PATHS (用户需修改 / USER MUST MODIFY) ==========
data:
  root: "data/"
  image_dir: "data/images/"       # 放置 (H,W,9) 的 .npy 文件
  mask_dir: "data/masks/"         # 放置 (H,W) 的 .npy 二值掩码
  split_dir: "data/splits/"       # 5-fold JSON 划分文件
  norm_stats: "data/norm_stats.json"  # 归一化统计量（自动生成）
  num_channels: 9                 # MSI 波段数
  num_classes: 2                  # 背景 + 瘀伤
  input_size: 512                 # 训练时 resize 到 512×512
  wavelengths: [713, 736, 759, 782, 805, 828, 851, 874, 897, 920]

# ========== 📂 OUTPUT PATHS ==========
output:
  root: "outputs/"
  checkpoints: "outputs/checkpoints/"
  logs: "outputs/logs/"
  predictions: "outputs/predictions/"
  results: "outputs/results/"

# ========== MODEL ==========
model:
  name: "msi_bruisenet"
  backbone: "mobilenetv2"
  pretrained: true                # 加载 ImageNet 预训练
  attention: "lsaa"               # 选项: lsaa / se / cbam / eca / none
  fusion: "convglu"               # 选项: convglu / concat
  bypass: true                    # LSAA 残差连接
  lsaa_kernel_size: 5             # 局部窗口 k
  lsaa_reduction: 4               # 通道缩减比
  decoder_channels: [256, 128, 64, 32]

# ========== TRAINING ==========
train:
  epochs: 200
  batch_size: 4
  optimizer: "adamw"
  lr: 1.0e-4
  weight_decay: 1.0e-4
  scheduler: "cosine"
  warmup_epochs: 10
  num_folds: 5
  num_seeds: 3                    # 每个 fold 跑 3 个随机种子
  seeds: [42, 123, 2024]
  val_interval: 10                # 每 N 个 epoch 验证一次
  num_workers: 4
  pin_memory: true

# ========== LOSS ==========
loss:
  ce_weight: 1.0
  dice_weight: 1.0
  aux_weight: 0.0                 # > 0 时启用谱残差辅助损失
  boundary_dilation: 3            # 边界膨胀像素数

# ========== AUGMENTATION ==========
augmentation:
  h_flip: 0.5
  v_flip: 0.5
  rotate_limit: 30
  elastic_transform: true
  brightness_range: [0.8, 1.2]
  gaussian_noise_std: 0.01

# ========== EVALUATION ==========
evaluation:
  area_bins_cm2: [0, 1.0, 3.0, 1000.0]  # 按面积分层: <1, 1-3, >3 cm²
  pixel_per_cm: 50.0                       # 像素/厘米（用户根据实际标定修改）
