# ============================================================================
# Config: sda_skip — baseline + SDA-Skip（skip 处光谱差异注意力）
# ----------------------------------------------------------------------------
# 工作流（在 baseline 基础上的差异）：
#   [5b] Decoder   : 每个 skip connection 处插入 SpectralDifferenceAttention
#                   (mode="skip")，在 concat 后的特征上计算谱残差注意力。
#                   每层一个独立的 SDA 实例 (2 params × 4 levels = 8 params)。
#                   替代 SE / CBAM 的位置。
#   其余 train/data/augment 与 baseline 一致
# ============================================================================

experiment_name: "sda_skip"

model:
  num_classes: 2
  encoder_name: "mobilenetv2"
  encoder_pretrained: true
  skip_module: "sda"
  use_spectral_conv: false
  use_aspp: false
  use_band_attention: false
  use_global_branch: false
  use_sda_input: false

data:
  data_dir: "/root/autodl-tmp/datasets/185_9bands"
  image_dir: "images"
  mask_dir: "masks"
  num_channels: 4
  num_classes: 2
  image_size: 512
  crop_size: 384
  band_indices: [0, 2, 4, 5]
  use_sharpen: false
  sharpen_sigma: 1.0
  sharpen_alpha: 1.5

train:
  batch_size: 32
  num_epochs: 500
  optimizer: "adamw"
  lr: 5.0e-4
  weight_decay: 1.0e-4
  scheduler: "cosine"
  eta_min: 1.0e-6
  use_warmup: false
  warmup_epochs: 5
  warmup_start_factor: 0.01
  loss: "ce_dice"
  ce_weight: 0.5
  dice_weight: 0.5
  save_interval: 99999
  early_stopping_patience: 50
  val_interval: 1
  num_workers: 4
  pin_memory: true

  augment:
    horizontal_flip: true
    vertical_flip: true
    random_rotation: true
    elastic_transform: false
    gaussian_noise: false

eval:
  visualize: true
  num_vis_samples: 10
  vis_bands: [0, 4, 8]
