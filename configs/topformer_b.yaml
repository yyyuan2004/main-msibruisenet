# ============================================================================
# Config: topformer_b — TopFormer-Base (CVPR 2022)
# ----------------------------------------------------------------------------
# Token Pyramid Transformer for lightweight semantic segmentation.
# Base variant: ~5.1M params.
# Pretrained: ImageNet-1K backbone (if available at pretrained_path).
# ============================================================================

experiment_name: "topformer_b"

model:
  architecture: "topformer"
  variant: "base"
  num_classes: 2
  # Download from: https://drive.google.com/drive/folders/1NLz3QCDbaXJ2DeGxLPUfupZZbojceDJM
  pretrained_path: "pretrained/topformer-B-224-75.3.pth"

data:
  data_dir: "/root/autodl-tmp/datasets/185_9bands"
  image_dir: "images"
  mask_dir: "masks"
  num_channels: 4
  num_classes: 2
  image_size: 512
  crop_size: 384
  band_indices: [0, 2, 4, 5]
  use_sharpen: false
  sharpen_sigma: 1.0
  sharpen_alpha: 1.5

train:
  batch_size: 32
  num_epochs: 300
  optimizer: "adamw"
  lr: 5.0e-4
  weight_decay: 1.0e-4
  scheduler: "cosine"
  eta_min: 1.0e-6
  use_warmup: false
  warmup_epochs: 5
  warmup_start_factor: 0.01
  loss: "ce_dice"
  ce_weight: 0.5
  dice_weight: 0.5
  save_interval: 99999
  early_stopping_patience: 100
  val_interval: 1
  num_workers: 4
  pin_memory: true

  augment:
    horizontal_flip: true
    vertical_flip: true
    random_rotation: true
    elastic_transform: false
    gaussian_noise: false

eval:
  visualize: true
  num_vis_samples: 10
  vis_bands: [0, 4, 8]
