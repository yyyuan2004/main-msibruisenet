# =============================================================================
# Fused Config: ASPP + CBAM→ConvGLU + 双正则Loss
# =============================================================================
#
# 融合架构设计思路（三层增强，各司其职）:
#
#   ┌────────────────────────────────────────────────────────────────┐
#   │ 第1层: ASPP @ Bottleneck（宏观尺度感知）                       │
#   │   位置: Encoder S5 (320ch, 16x16) → Decoder 入口               │
#   │   作用: 用空洞卷积(rate=1/6/12/18)+全局池化捕获多尺度上下文      │
#   │   意义: 苹果缺陷大小不一（微小碰伤 vs 大面积压伤），ASPP让       │
#   │         bottleneck同时看到局部细节和全局上下文                    │
#   │   通道变化: 320ch → 256ch                                      │
#   ├────────────────────────────────────────────────────────────────┤
#   │ 第2层: CBAM→ConvGLU @ 每层跳跃连接（注意力+通道混合）            │
#   │   位置: Decoder每级的Concat之后                                 │
#   │   CBAM: 通道注意力(GAP+GMP→MLP→sigmoid) + 空间注意力            │
#   │         (Avg/Max池化→Conv7x7→sigmoid)                          │
#   │         → "看哪里重要": 筛选有用的通道和空间位置                  │
#   │   ConvGLU: value分支 + gate分支(DWConv→GELU) → 逐元素相乘       │
#   │         → "怎么融合": GELU软门控做通道降维和非线性混合             │
#   │   串行顺序: CBAM先筛选(注意力) → ConvGLU再变换(通道混合)          │
#   │   vs 单独SE:  多了空间注意力 + 更强的通道变换能力                 │
#   │   vs 单独ConvGLU: 多了注意力引导，ConvGLU不会盲目混合             │
#   ├────────────────────────────────────────────────────────────────┤
#   │ 第3层: 双正则Loss（各向异性平滑）                                │
#   │   SpectralSmoothnessLoss (weight=0.1):                         │
#   │     预测概率图的总变分(TV)正则 → 平坦区域抑制噪声                 │
#   │   EdgePreservingLoss (weight=0.05):                            │
#   │     在GT边缘处最大化预测梯度 → 缺陷边界保持锐利                   │
#   │   两者结合 = 各向异性平滑: 平坦处光滑 + 边缘处锐利               │
#   │   不改网络结构，只改损失函数。                                   │
#   └────────────────────────────────────────────────────────────────┘
#
# 推理后处理（零训练改动，eval.py中可选开启）:
#   python eval.py --postprocess guided --guide_radius 4 --guide_eps 0.01
#   用原始光谱图做引导滤波，在光谱边缘处保留细节，平坦处抑制噪声。

experiment_name: "fused"

model:
  num_classes: 2
  encoder_pretrained: true

  # --- 第2层: CBAM→ConvGLU 融合跳跃连接 ---
  # skip_module="cbam_convglu" 表示:
  #   Concat后 → CBAM(通道+空间注意力) → ConvGLU(GELU门控通道混合)
  skip_module: "cbam_convglu"
  se_reduction: 16                   # CBAM通道注意力的压缩率
  convglu_expansion_ratio: 4         # ConvGLU隐层扩展比

  use_spectral_conv: false

  # --- 第1层: ASPP 多尺度上下文 ---
  use_aspp: true                     # Encoder bottleneck处插入ASPP
  aspp_out_channels: 256             # 320 → 256
  aspp_atrous_rates: [6, 12, 18]     # 空洞率: 小/中/大感受野
  aspp_dropout: 0.5                  # ASPP投影层dropout（防过拟合）

data:
  data_dir: "data"
  image_dir: "images"
  mask_dir: "masks"
  num_channels: 9
  num_classes: 2
  image_size: 512
  crop_size: 384

train:
  batch_size: 4
  num_epochs: 200
  optimizer: "adamw"
  lr: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: "cosine"
  eta_min: 1.0e-6

  # --- 第3层: 双正则Loss ---
  loss: "ce_dice"
  ce_weight: 0.5
  dice_weight: 0.5
  # 光谱平滑正则: 平坦区域抑制噪声 (TV正则)
  spectral_smoothness_weight: 0.1
  # 边缘保持正则: 缺陷边界保留锐利梯度
  # 从0.05开始, 太大(>0.2)会产生高频伪影
  edge_preserve_weight: 0.05

  augment:
    horizontal_flip: true
    vertical_flip: true
    random_rotation: true
    elastic_transform: false
    gaussian_noise: false
    gaussian_noise_std: 0.01

  val_interval: 1
  save_interval: 50
  num_workers: 4
  pin_memory: true

eval:
  visualize: true
  num_vis_samples: 10
  vis_bands: [0, 4, 8]
  # 推理后处理（可选，在eval.py命令行中开启）:
  #   --postprocess guided          引导滤波
  #   --postprocess unsharp         Unsharp Masking
  #   --postprocess unsharp+guided  两者结合
