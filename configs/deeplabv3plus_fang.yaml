# ============================================================================
# Config: deeplabv3plus_fang — Fang 2025 Improved DeepLabV3+
# ----------------------------------------------------------------------------
# 参考：Fang et al. 2025 "Multispectral imaging-based detection of apple bruises
#       using segmentation network and classification model"
#
# 工作流：
#   [1-4] 数据/预处理/划分/增强 与 baseline 完全一致
#   [5]   模型：Fang 改进版 DeepLabV3+
#           - Encoder: MobileNetV2 (ImageNet pretrained, 9ch 适配)
#           - DSConv ASPP: 深度可分离卷积版 ASPP，大幅降低 ASPP 参数量
#           - ECA (Efficient Channel Attention): 轻量级无降维通道注意力
#           - Low-level feature (48ch) 融合到解码端
#           - 由 model/deeplabv3plus.py::build_deeplabv3plus_fang() 构建
#   [6]   损失：Focal Loss (γ=2, α=0.25) — 强正负样本失衡场景
#   [7-10] 优化器/训练/评估/可视化 与 baseline 一致
#
#   作为直接对照实验，复现 2025 年同场景论文方法，验证自研架构相对位置。
# ============================================================================

experiment_name: "deeplabv3plus_fang"

model:
  architecture: "deeplabv3plus_fang"
  num_classes: 2
  encoder_name: "mobilenetv2"
  encoder_pretrained: true
  aspp_out_channels: 256
  low_level_channels: 48

data:
  data_dir: "/root/autodl-tmp/datasets/185_9bands"
  image_dir: "images"
  mask_dir: "masks"
  num_channels: 9
  num_classes: 2
  image_size: 512
  crop_size: 384
  band_indices: null
  use_sharpen: false
  sharpen_sigma: 1.0
  sharpen_alpha: 1.5

train:
  batch_size: 32
  num_epochs: 500
  optimizer: "adamw"
  lr: 5.0e-4
  weight_decay: 1.0e-4
  scheduler: "cosine"
  eta_min: 1.0e-6
  loss: "focal"
  focal_gamma: 2.0
  focal_alpha: 0.25
  save_interval: 99999
  early_stopping_patience: 50
  val_interval: 1
  num_workers: 4
  pin_memory: true

  augment:
    horizontal_flip: true
    vertical_flip: true
    random_rotation: true
    elastic_transform: false
    gaussian_noise: false

eval:
  visualize: true
  num_vis_samples: 10
  vis_bands: [0, 4, 8]
