# ============================================================================
# Config: baseline_sharpen — MobileNetV2-UNet + Unsharp Masking 预处理
# ----------------------------------------------------------------------------
# 工作流：
#   [1] 数据读取   : 加载 185 张 9波段 .npy 图像与 0/1 二值 mask
#   [2] 预处理     : Unsharp Masking 锐化 (sigma=1.0, alpha=1.5)
#                   sharpened = image + alpha * (image - GaussianBlur(image))
#                   增强边缘/纹理细节，可能提升瘀伤边界分割精度
#   [3] 数据划分   : train:val = 7:3（由 data/split.py 实现，seed 控制）
#   [4] 数据增强   : 仅空间变换 (H-flip, V-flip, 90/180/270° 旋转)
#   [5] 模型结构   : MobileNetV2 + UNet decoder (skip_module="none")
#                   与 baseline 完全一致，仅输入经过锐化
#   [6] 损失函数   : 0.5 * CrossEntropy + 0.5 * Dice
#   [7] 优化器     : AdamW (lr=5e-4, wd=1e-4) + CosineAnnealingLR (eta_min=1e-6)
#   [8] 训练策略   : 500 epochs, 早停 patience=50 (监控 class1 IoU)
#   [9] 评估       : val set class1 IoU / F1 / Precision / Recall
#   [10] 可视化    : train_eval.py 自动生成指标曲线 + 预测可视化（含锐化前后对比）
#
#   作为预处理消融对照，验证 Unsharp Masking 是否对分割性能有提升。
# ============================================================================

experiment_name: "baseline_sharpen"

model:
  num_classes: 2
  encoder_name: "mobilenetv2"
  encoder_pretrained: true
  skip_module: "none"
  use_spectral_conv: false
  use_band_attention: false

data:
  data_dir: "/root/autodl-tmp/datasets/185_9bands"
  image_dir: "images"
  mask_dir: "masks"
  num_channels: 4
  num_classes: 2
  image_size: 512
  crop_size: 384
  band_indices: [0, 2, 4, 5]
  # 开启 Unsharp Masking 锐化
  use_sharpen: true
  sharpen_sigma: 1.0
  sharpen_alpha: 1.5

train:
  batch_size: 32
  num_epochs: 500
  optimizer: "adamw"
  lr: 5.0e-4
  weight_decay: 1.0e-4
  scheduler: "cosine"
  eta_min: 1.0e-6
  use_warmup: false
  warmup_epochs: 5
  warmup_start_factor: 0.01
  loss: "ce_dice"
  ce_weight: 0.5
  dice_weight: 0.5
  save_interval: 99999
  early_stopping_patience: 50
  val_interval: 1
  num_workers: 4
  pin_memory: true

  augment:
    horizontal_flip: true
    vertical_flip: true
    random_rotation: true
    elastic_transform: false
    gaussian_noise: false

eval:
  visualize: true
  num_vis_samples: 10
  vis_bands: [0, 4, 8]
