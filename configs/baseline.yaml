# Baseline: EfficientNet-B0-UNet without any enhancement modules
experiment_name: "baseline"

model:
  num_classes: 2
  encoder_name: "mobilenetv2"
  encoder_pretrained: true
  # Skip connection enhancement module: none / se / convglu
  skip_module: "none"
  # Spectral conv after S1: true / false
  use_spectral_conv: false

data:
  data_dir: "/root/autodl-tmp/datasets/185_9bands"
  image_dir: "images"
  mask_dir: "masks"
  num_channels: 9
  num_classes: 2
  image_size: 512
  crop_size: 384

train:
  batch_size: 32
  num_epochs: 500
  optimizer: "adamw"
  lr: 5.0e-4
  weight_decay: 1.0e-4
  scheduler: "cosine"
  eta_min: 1.0e-6
  loss: "ce_dice"      # ce_dice / focal_dice
  focal_gamma: 2.0
  focal_alpha: 0.25
  dice_weight: 0.5
  ce_weight: 0.5

  # Data augmentation
  augment:
    horizontal_flip: true
    vertical_flip: true
    random_rotation: true
    elastic_transform: false
    gaussian_noise: false
    gaussian_noise_std: 0.01

  # Validation and checkpointing
  val_interval: 1
  save_interval: 99999
  num_workers: 4
  pin_memory: true

eval:
  visualize: true
  num_vis_samples: 10
  vis_bands: [0, 4, 8]   # bands for pseudo-color display (1st/5th/9th)
