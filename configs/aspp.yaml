# +ASPP: EfficientNet-B0-UNet with ASPP at bottleneck + Spectral Smoothness Regularization
#
# [NEW CONFIG] ASPP (Atrous Spatial Pyramid Pooling) is inserted between the
# EfficientNet-B0 encoder bottleneck (S5, 1280ch, 32x32) and the UNet decoder.
# It uses parallel dilated convolutions at rates {1, 6, 12, 18} + global pooling
# to capture multi-scale contextual information, transforming 1280ch -> 256ch.
#
# Additionally, Spectral Smoothness Regularization is enabled (weight=0.1)
# to encourage spatially smooth predictions that respect NIR spectral continuity.
#
# Loss = 0.5 * CE + 0.5 * Dice + 0.1 * SpectralSmoothness

experiment_name: "aspp"

model:
  num_classes: 2
  encoder_name: "mobilenetv2"
  encoder_pretrained: true
  skip_module: "none"                # No attention module at skip connections
  use_spectral_conv: false
  # --- ASPP configuration (NEW) ---
  use_aspp: true                     # [NEW] Enable ASPP at bottleneck
  aspp_out_channels: 256             # [NEW] ASPP output channels (1280 -> 256)
  aspp_atrous_rates: [6, 12, 18]     # [NEW] Dilation rates for ASPP branches
  aspp_dropout: 0.5                  # [NEW] Dropout after ASPP projection

data:
  data_dir: "/root/autodl-tmp/datasets/185_9bands"
  image_dir: "images"
  mask_dir: "masks"
  num_channels: 9
  num_classes: 2
  image_size: 512
  crop_size: 384

train:
  batch_size: 32
  num_epochs: 500
  optimizer: "adamw"
  lr: 5.0e-4
  weight_decay: 1.0e-4
  scheduler: "cosine"
  eta_min: 1.0e-6
  loss: "ce_dice"
  focal_gamma: 2.0
  focal_alpha: 0.25
  dice_weight: 0.5
  ce_weight: 0.5
  # --- Spectral Smoothness Regularization (NEW) ---
  spectral_smoothness_weight: 0.1    # [NEW] loss += 0.1 * TV(softmax(logits))

  augment:
    horizontal_flip: true
    vertical_flip: true
    random_rotation: true
    elastic_transform: false
    gaussian_noise: false
    gaussian_noise_std: 0.01

  val_interval: 1
  save_interval: 99999
  num_workers: 4
  pin_memory: true

eval:
  visualize: true
  num_vis_samples: 10
  vis_bands: [0, 4, 8]
