# ============================================================================
# Config: sda_multiscale — SDA v2 at input + S2 (multi-scale injection)
# ----------------------------------------------------------------------------
# SDA v2 anomaly maps are injected at two scales:
#   1. Input level: concatenated with raw bands → encoder sees 4+4=8 channels
#   2. S2 level: downsampled and concatenated with S2 encoder features
# This provides the model with spectral anomaly information at both the
# fine-grained input level and the mid-level feature representation.
# ============================================================================

experiment_name: "sda_multiscale"

model:
  num_classes: 2
  encoder_name: "mobilenetv2"
  encoder_pretrained: true
  skip_module: "none"
  use_spectral_conv: false
  use_aspp: false
  use_band_attention: false
  use_global_branch: false
  use_sda_input: false
  sda_v2:
    enabled: true
    position: "multiscale"
    features: ["spectral_std", "sam", "snv_l2", "mahalanobis"]
    sigma_a: 3.0
    sigma_t: 5.0
    gate_mode: "concat"
    use_soft_gate: true

data:
  data_dir: "/root/autodl-tmp/datasets/185_9bands"
  image_dir: "images"
  mask_dir: "masks"
  num_channels: 4
  num_classes: 2
  image_size: 512
  crop_size: 384
  band_indices: [0, 2, 4, 5]
  use_sharpen: false
  sharpen_sigma: 1.0
  sharpen_alpha: 1.5
  apple_mask_threshold: 0.05

train:
  batch_size: 32
  num_epochs: 500
  optimizer: "adamw"
  lr: 5.0e-4
  weight_decay: 1.0e-4
  scheduler: "cosine"
  eta_min: 1.0e-6
  use_warmup: false
  warmup_epochs: 5
  warmup_start_factor: 0.01
  loss: "ce_dice"
  ce_weight: 0.5
  dice_weight: 0.5
  save_interval: 99999
  early_stopping_patience: 50
  val_interval: 1
  num_workers: 4
  pin_memory: true

  augment:
    horizontal_flip: true
    vertical_flip: true
    random_rotation: true
    elastic_transform: false
    gaussian_noise: false

eval:
  visualize: true
  num_vis_samples: 10
  vis_bands: [0, 4, 8]
