# ============================================================================
# Config: sda_input — baseline + SDA-Input（输入端光谱差异注意力）
# ----------------------------------------------------------------------------
# 工作流（在 baseline 基础上的差异）：
#   [2.5] SDA-Input : 在 encoder 之前计算每像素的光谱残差
#                     (pixel spectrum − 3×3 邻域均值 spectrum) 的 L2 范数，
#                     归一化后经 1×1 Conv+Sigmoid 门控，乘回输入。
#                     缺陷/边界处谱残差大 → gate 大 → 增强特征；
#                     健康区谱残差近零 → gate ≈ 0 → 不抑制原始信号。
#                     仅 2 个可学习参数 (weight + bias)。
#   [5]   其余结构   : MobileNetV2 + UNet decoder (skip_module="none")
#   其余 train/data/augment 与 baseline 一致
# ============================================================================

experiment_name: "sda_input"

model:
  num_classes: 2
  encoder_name: "mobilenetv2"
  encoder_pretrained: true
  skip_module: "none"
  use_spectral_conv: false
  use_aspp: false
  use_band_attention: false
  use_global_branch: false
  use_sda_input: true
  sda_learnable_gate: true

data:
  data_dir: "/root/autodl-tmp/datasets/185_9bands"
  image_dir: "images"
  mask_dir: "masks"
  num_channels: 4
  num_classes: 2
  image_size: 512
  crop_size: 384
  band_indices: [0, 2, 4, 5]
  use_sharpen: false
  sharpen_sigma: 1.0
  sharpen_alpha: 1.5

train:
  batch_size: 32
  num_epochs: 500
  optimizer: "adamw"
  lr: 5.0e-4
  weight_decay: 1.0e-4
  scheduler: "cosine"
  eta_min: 1.0e-6
  use_warmup: false
  warmup_epochs: 5
  warmup_start_factor: 0.01
  loss: "ce_dice"
  ce_weight: 0.5
  dice_weight: 0.5
  save_interval: 99999
  early_stopping_patience: 50
  val_interval: 1
  num_workers: 4
  pin_memory: true

  augment:
    horizontal_flip: true
    vertical_flip: true
    random_rotation: true
    elastic_transform: false
    gaussian_noise: false

eval:
  visualize: true
  num_vis_samples: 10
  vis_bands: [0, 4, 8]
