# +SpConv: MobileNetV2-UNet with spectral 1D convolution after S1
_base: _defaults.yaml

experiment_name: "spconv"

model:
  num_classes: 2
  encoder_name: "mobilenetv2"
  encoder_pretrained: true
  skip_module: "none"
  use_spectral_conv: true
  spectral_conv_kernel_size: 3

data:
  num_channels: 9
  band_indices: null
