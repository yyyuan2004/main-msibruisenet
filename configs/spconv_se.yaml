# +SpConv+SE: MobileNetV2-UNet with 1D SpectralConv + SE skip connections
_base: _defaults.yaml

experiment_name: "spconv_se"

model:
  num_classes: 2
  encoder_name: "mobilenetv2"
  encoder_pretrained: true
  skip_module: "se"
  se_reduction: 16
  use_spectral_conv: true
  spectral_conv_kernel_size: 3
