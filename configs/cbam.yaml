# +CBAM: MobileNetV2-UNet with CBAM at skip connections + Spectral Smoothness Regularization
#
# [NEW CONFIG] CBAM (Convolutional Block Attention Module) replaces SE at each
# skip connection level in the UNet decoder. Compared to SE (channel-only attention),
# CBAM applies:
#   1) Channel Attention: GAP + GMP -> shared MLP -> sigmoid -> channel scaling
#   2) Spatial Attention: AvgPool + MaxPool along channels -> Conv7x7 -> sigmoid
# The spatial attention component helps the model better localize defect regions.
#
# Additionally, Spectral Smoothness Regularization is enabled (weight=0.1)
# to encourage spatially smooth predictions that respect NIR spectral continuity.
#
# Loss = 0.5 * CE + 0.5 * Dice + 0.1 * SpectralSmoothness

experiment_name: "cbam"

model:
  num_classes: 2
  encoder_pretrained: true
  skip_module: "cbam"                # [NEW] CBAM at each decoder skip connection
  se_reduction: 16                   # Shared reduction ratio for CBAM channel attn
  use_spectral_conv: false
  use_aspp: false

data:
  data_dir: "data"
  image_dir: "images"
  mask_dir: "masks"
  num_channels: 9
  num_classes: 2
  image_size: 512
  crop_size: 384

train:
  batch_size: 4
  num_epochs: 200
  optimizer: "adamw"
  lr: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: "cosine"
  eta_min: 1.0e-6
  loss: "ce_dice"
  focal_gamma: 2.0
  focal_alpha: 0.25
  dice_weight: 0.5
  ce_weight: 0.5
  # --- Spectral Smoothness Regularization (NEW) ---
  spectral_smoothness_weight: 0.1    # [NEW] loss += 0.1 * TV(softmax(logits))

  augment:
    horizontal_flip: true
    vertical_flip: true
    random_rotation: true
    elastic_transform: false
    gaussian_noise: false
    gaussian_noise_std: 0.01

  val_interval: 1
  save_interval: 50
  num_workers: 4
  pin_memory: true

eval:
  visualize: true
  num_vis_samples: 10
  vis_bands: [0, 4, 8]
