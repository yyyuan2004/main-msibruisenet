# ============================================================================
# Config: smp_unet_resnet34 — SMP U-Net with ResNet34 encoder
# ----------------------------------------------------------------------------
# 工作流：
#   [1-4] 数据/预处理/划分/增强 与 baseline 完全一致
#   [5]   模型：segmentation_models_pytorch 的 U-Net 封装
#           - Encoder: ResNet34 (ImageNet pretrained, 9ch 适配)
#           - 经典 U-Net 解码器，skip connections + 双线性上采样
#           - 由 model/smp_models.py::build_smp_model() 构建
#   [6-10] 损失/优化器/训练/评估/可视化 与 baseline 一致
#
#   作为 cross-method 对照，代表"经典 U-Net + 强 encoder"思路，
#   与自研 MobileNetV2-UNet 对比参数效率。
# ============================================================================

experiment_name: "smp_unet_resnet34"

model:
  architecture: "smp"
  smp_arch: "Unet"
  smp_encoder: "resnet34"
  num_classes: 2
  encoder_pretrained: true

data:
  data_dir: "/root/autodl-tmp/datasets/185_9bands"
  image_dir: "images"
  mask_dir: "masks"
  num_channels: 9
  num_classes: 2
  image_size: 512
  crop_size: 384
  band_indices: null
  use_sharpen: false
  sharpen_sigma: 1.0
  sharpen_alpha: 1.5

train:
  batch_size: 32
  num_epochs: 500
  optimizer: "adamw"
  lr: 5.0e-4
  weight_decay: 1.0e-4
  scheduler: "cosine"
  eta_min: 1.0e-6
  loss: "ce_dice"
  ce_weight: 0.5
  dice_weight: 0.5
  save_interval: 99999
  early_stopping_patience: 50
  val_interval: 1
  num_workers: 4
  pin_memory: true

  augment:
    horizontal_flip: true
    vertical_flip: true
    random_rotation: true
    elastic_transform: false
    gaussian_noise: false

eval:
  visualize: true
  num_vis_samples: 10
  vis_bands: [0, 4, 8]
