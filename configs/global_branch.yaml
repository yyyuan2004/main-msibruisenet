# +GlobalBranch: EfficientNet-B0-UNet with low-res global saliency branch
#
# GlobalSaliencyBranch 是一个轻量级并行分支:
#   原图下采样4x → 3层小卷积 → 单通道attention map → sigmoid
#   attention map 乘到 main branch 的 bottleneck (S5) 特征上
#
# 作用: 低分辨率分支看到全局上下文，输出"哪些区域可疑"的粗定位热图，
#       引导 decoder 重点关注这些区域。
#
# 参数增量 ~5万个 (3层小卷积), 不会加重过拟合。
# 训练完后可可视化 attention map — 如果在凹坑区域给出高响应,
# 这就是一个很好的论文 figure。

experiment_name: "global_branch"

model:
  num_classes: 2
  encoder_name: "efficientnet_b0"
  encoder_pretrained: true
  skip_module: "none"
  use_spectral_conv: false
  use_aspp: false
  use_band_attention: false
  use_global_branch: true       # 开启全局显著性分支
  global_downsample: 4          # 输入缩小4倍后送入global branch

data:
  data_dir: "/home/yy/datasets/153"
  image_dir: "images"
  mask_dir: "masks"
  num_channels: 9
  num_classes: 2
  image_size: 512
  crop_size: 384

train:
  batch_size: 4
  num_epochs: 200
  optimizer: "adamw"
  lr: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: "cosine"
  eta_min: 1.0e-6
  loss: "ce_dice"
  focal_gamma: 2.0
  focal_alpha: 0.25
  dice_weight: 0.5
  ce_weight: 0.5

  augment:
    horizontal_flip: true
    vertical_flip: true
    random_rotation: true
    elastic_transform: false
    gaussian_noise: false
    gaussian_noise_std: 0.01

  val_interval: 1
  save_interval: 50
  num_workers: 4
  pin_memory: true

eval:
  visualize: true
  num_vis_samples: 10
  vis_bands: [0, 4, 8]
