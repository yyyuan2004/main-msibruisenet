# ============================================================================
# Config: global_branch — +GlobalSaliencyBranch (全局显著性并行分支)
# ----------------------------------------------------------------------------
# 工作流（在 baseline 基础上的差异）：
#   [5a] 主分支     : MobileNetV2 + UNet decoder (正常高分辨率 forward)
#   [5b] 并行分支   : GlobalSaliencyBranch — 原图下采样 4x → 3 层小卷积
#                     → 单通道 attention map → Sigmoid
#                     将 attention map 上采样后与主分支 bottleneck (S5) 相乘，
#                     引导 decoder 聚焦到全局视角下的可疑区域
#   参数增量 ~5 万，不会加重过拟合。训练后可可视化 attention map
#   作为可解释性 figure。
#   其余 train/data/augment 与 baseline 一致
# ============================================================================

experiment_name: "global_branch"

model:
  num_classes: 2
  encoder_name: "mobilenetv2"
  encoder_pretrained: true
  skip_module: "none"
  use_spectral_conv: false
  use_aspp: false
  use_band_attention: false
  use_global_branch: true           # 开启全局显著性并行分支
  global_downsample: 4              # 输入缩小 4x 后送入 global branch

data:
  data_dir: "/root/autodl-tmp/datasets/185_9bands"
  image_dir: "images"
  mask_dir: "masks"
  num_channels: 4
  num_classes: 2
  image_size: 512
  crop_size: 384
  band_indices: [0, 2, 4, 5]
  use_sharpen: false
  sharpen_sigma: 1.0
  sharpen_alpha: 1.5

train:
  batch_size: 32
  num_epochs: 500
  optimizer: "adamw"
  lr: 5.0e-4
  weight_decay: 1.0e-4
  scheduler: "cosine"
  eta_min: 1.0e-6
  use_warmup: false
  warmup_epochs: 5
  warmup_start_factor: 0.01
  loss: "ce_dice"
  ce_weight: 0.5
  dice_weight: 0.5
  save_interval: 99999
  early_stopping_patience: 50
  val_interval: 1
  num_workers: 4
  pin_memory: true

  augment:
    horizontal_flip: true
    vertical_flip: true
    random_rotation: true
    elastic_transform: false
    gaussian_noise: false

eval:
  visualize: true
  num_vis_samples: 10
  vis_bands: [0, 4, 8]
