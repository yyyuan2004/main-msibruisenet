# +BandAttn: EfficientNet-B0-UNet with learnable per-band weighting
#
# BandAttention 在 encoder 之前对输入的 9 个物理波段做可学习加权。
# 与 SE 的区别:
#   - SE: 在 decoder skip connection 处对"抽象特征通道"做注意力
#   - BandAttention: 直接对原始 9 个光谱波段做加权（更可解释）
#
# 训练完后调用 model.band_attention.get_weights() 即可读出每个波段的权重,
# 高权重波段 = 对缺陷检测贡献最大的波段。这本身是有价值的实验发现。
#
# 仅增加 9 个可学习参数, 无过拟合风险。

experiment_name: "band_attn"

model:
  num_classes: 2
  encoder_name: "mobilenetv2"
  encoder_pretrained: true
  skip_module: "none"
  use_spectral_conv: false
  use_aspp: false
  use_band_attention: true    # 唯一的区别: 输入端波段加权

data:
  data_dir: "/root/autodl-tmp/datasets/185_9bands"
  image_dir: "images"
  mask_dir: "masks"
  num_channels: 9
  num_classes: 2
  image_size: 512
  crop_size: 384

train:
  batch_size: 32
  num_epochs: 500
  optimizer: "adamw"
  lr: 5.0e-4
  weight_decay: 1.0e-4
  scheduler: "cosine"
  eta_min: 1.0e-6
  loss: "ce_dice"
  focal_gamma: 2.0
  focal_alpha: 0.25
  dice_weight: 0.5
  ce_weight: 0.5

  augment:
    horizontal_flip: true
    vertical_flip: true
    random_rotation: true
    elastic_transform: false
    gaussian_noise: false
    gaussian_noise_std: 0.01

  val_interval: 1
  save_interval: 99999
  num_workers: 4
  pin_memory: true

eval:
  visualize: true
  num_vis_samples: 10
  vis_bands: [0, 4, 8]
